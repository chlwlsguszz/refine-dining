# =========================================================
# Application Configuration
# =========================================================
spring:
  application:
    name: refine-dining

# =======local dev environment, need to change this===========
  profiles:
    active: local

  # =========================================================
  # Database Configuration (MySQL)
  # =========================================================
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:refine_dining}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # =========================================================
  # JPA & Hibernate Configuration
  # =========================================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true # 쿼리 상단에 어떤 로직에서 왔는지 주석 표시
        dialect: org.hibernate.dialect.MySQLDialect

# =========================================================
# Public Data API Configuration
# =========================================================
public-data:
  api-key: ${PUBLIC_DATA_API_KEY}
  base-url: https://api.data.go.kr/openapi/tn_pubr_public_nutri_material_info_api

# =========================================================
# Gemini AI Configuration (for weight prediction)
# =========================================================
gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com/v1beta
  model: gemini-2.5-flash

# =========================================================
# Logging Configuration
# =========================================================
logging:
  level:
    org.hibernate.SQL: DEBUG
    com.refinedining: INFO
