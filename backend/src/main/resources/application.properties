# =========================================================
# Application Configuration
# =========================================================
spring.application.name=refine-dining

# =========================================================
# Database Configuration (MySQL)
# =========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/refinedining?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================================================
# JPA & Hibernate Configuration
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================================================
# Public Data API Configuration
# =========================================================
public-data.api-key=${PUBLIC_DATA_API_KEY}
public-data.base-url=http://api.data.go.kr/openapi/tn_pubr_public_nutri_material_info_api

# =========================================================
# Logging Configuration
# =========================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.refinedining=INFO